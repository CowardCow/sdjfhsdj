<!DOCTYPE html>
<html>
<head>
    <title>2510990093_G1</title>
    <style>
        /* 1. Background Color for Margins/Page */
        body {
            /* Lighter green background for the page margins */
            background-color: #6aa84f; 
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            
            /* 2. Centering the Form (Horizontal Only) */
            display: flex;
            justify-content: center; /* Horizontally centers the form */
            /* Removed align-items: center; to keep the form near the top */
        }
        
        form {
            /* Narrower max-width for a more elegant, contained look */
            width: 90%;
            max-width: 400px; 
            margin-top: 40px; /* Add space from the top of the browser */
            margin-bottom: 40px; /* Add space at the bottom */
            
            /* 3. Adjusting Font Size and Adding Padding/Background */
            background-color: #ffffff; 
            padding: 25px; /* Slightly increased padding inside the form */
            border-radius: 12px; /* Slightly more rounded corners */
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.15); /* Stronger shadow */
            
            /* Base font size adjustment */
            font-size: 1em; /* Reduced base font size slightly for balance */
        }

        fieldset {
            border: 1px solid #e0e0e0; /* Lighter border color */
            padding: 15px; /* Reduced internal padding */
            border-radius: 8px;
        }

        legend {
            /* Making the legend text size a bit larger and clearer */
            font-size: 1.5em; /* Slightly larger legend */
            font-weight: bold;
            padding: 0 10px;
            text-align: center;
            color: #4CAF50; /* Match text color to the submit button */
        }
        
        /* Styling inputs and textarea for better appearance */
        input[type="text"],
        input[type="number"],
        input[type="email"],
        input[type="password"],
        select,
        textarea {
            width: 100%; /* Use 100% width, let box-sizing handle padding */
            height: 38px; /* Standardized height for inputs */
            padding: 0 10px; 
            margin-top: 3px; /* Reduced margin */
            margin-bottom: 8px; /* Reduced margin */
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box; 
            font-size: 1em; 
        }

        textarea {
            height: auto; /* Override fixed height for textarea */
            min-height: 80px; /* Ensure a minimum height for the address field */
            padding: 10px;
        }

        /* Remove the excessive vertical space from <br> tags */
        br {
            content: "";
            display: block;
            margin-top: 0; 
            line-height: 0;
        }

        button {
            padding: 10px 15px;
            margin-right: 10px;
            margin-top: 15px; /* Add some space above the buttons */
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }

        button[type="submit"] {
            background-color: #4CAF50;
            color: white;
        }

        button[type="submit"]:hover {
            background-color: #45a049;
        }

        button[type="reset"] {
            background-color: #f44336;
            color: white;
        }

        button[type="reset"]:hover {
            background-color: #da190b;
        }
    </style>
</head>
<body>
<form autocomplete="on" action="thank.html" target="_blank">
<fieldset>
<legend>LOGIN FORM</legend>
<label><b>Name:</b></label><input type="text" placeholder="Enter your name here" required>
<br>
<label>Phone:</label><input type="number" minlength="10" maxlength="10" placeholder="Enter your phone no. here">
<br>
<label>Email:</label> <input type="email" placeholder="Enter your email here" required>
<br>
Address(required for deliveries):<textarea rows="5"></textarea>
<br>
<label>Password:</label><input type="password" minlength="10" maxlength="10" placeholder="Enter your password" required>
<br>
<label>Citizen of</label><select><option>India</option>
<option>Others</option></select>
<br>
<label>Prefferable Beverage</label>
<br>
<input type="radio" id="tea" name="beverage"><label for="tea">Tea</label>
<br>   
<input type="radio" id="black_tea" name="beverage"><label for="black_tea">Black tea</label>
<br>
<input type="radio" id="oolong_tea" name="beverage"><label for="oolong_tea">Oolong Tea</label>
<br>
<label>Products</label>
<br>
<input type="checkbox" id="pure_premium"><label for="pure_premium">Pure tea Premimium</label>
<br>
<input type="checkbox" id="pure_herbal"><label for="pure_herbal">Pure Herbal tea</label>
<br>
<input type="checkbox" id="pure_label"><label for="pure_label">Pure Label Tea</label>
<br>
<button type="submit" class="button-danger">Log In</button>
<button type="reset">Reset</button>
</fieldset>
</form>
</body>
</html
