<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Favourites – PTME</title>
    <link rel="icon" type="image" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQRkZhdHz60wLw3c4ZtJee9KG4kddHOcNwQ_A&s">
    <style>
        body {
            font-family: "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: #F9FDF5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #2F4F4F;
            margin: 0;
            line-height: 1.5;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        /* Navbar */
        header {
            background-color: #6AA84F;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 0;
        }

        .logo {
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 0.05em;
            padding: 10px 20px;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            padding: 0.5rem 0.75rem;
            border-radius: 0.5rem;
            transition: background-color 0.15s ease-in-out;
        }

        .nav-links a:hover {
            background-color: #4A7836;
        }

        #fav-nav-link {
            background-color: rgba(255,255,255,0.15);
            font-weight: 700;
        }

        #fav-nav-link:hover {
            background-color: #4A7836;
        }

        @media (max-width: 768px) {
            .nav-links { display: none; }
        }

        /* Main */
        main {
            flex-grow: 1;
            padding: 2.5rem 0;
        }

        .page-header {
            margin-bottom: 2rem;
        }

        .page-header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            color: #6AA84F;
            margin: 0 0 0.4rem 0;
        }

        .page-header p {
            color: #2F4F4F;
            margin: 0;
        }

        /* Favourites grid */
        #fav-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
        }

        .fav-card {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: 1.5rem;
            background-color: #ffffff;
            border-radius: 0.75rem;
            border: 1px solid #e5e7eb;
            border-top: 5px solid #6AA84F;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.08);
            flex: 1 1 260px;
            transition: box-shadow 0.3s ease;
        }

        .fav-card:hover {
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.15);
        }

        .fav-card h3 {
            font-size: 1.15rem;
            font-weight: bold;
            color: #6AA84F;
            margin: 0 0 0.4rem 0;
        }

        .fav-card p {
            font-size: 0.875rem;
            color: #2F4F4F;
            flex-grow: 1;
            margin: 0 0 0.75rem 0;
        }

        .tea-tag {
            display: inline-block;
            background-color: #6AA84F;
            color: white;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 2px 10px;
            border-radius: 999px;
            margin-bottom: 0.6rem;
        }

        .remove-btn {
            margin-top: 0.6rem;
            padding: 0.4rem 1rem;
            background-color: white;
            color: #f44336;
            border: 2px solid #f44336;
            border-radius: 0.5rem;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.15s ease, color 0.15s ease;
        }

        .remove-btn:hover {
            background-color: #f44336;
            color: white;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            background-color: #ffffff;
            border-radius: 0.75rem;
            border: 1px solid #e5e7eb;
            width: 100%;
        }

        .empty-state h2 {
            color: #6AA84F;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .empty-state p {
            color: #888;
            margin-bottom: 1.5rem;
        }

        .empty-state a {
            display: inline-block;
            padding: 0.6rem 1.4rem;
            background-color: #6AA84F;
            color: white;
            border-radius: 0.5rem;
            text-decoration: none;
            font-weight: 600;
            transition: background-color 0.15s ease;
        }

        .empty-state a:hover {
            background-color: #4A7836;
        }

        /* Clear all button */
        #clear-all-btn {
            margin-top: 1.5rem;
            padding: 0.5rem 1.2rem;
            background-color: #f44336;
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            display: none;
            transition: background-color 0.15s ease;
        }

        #clear-all-btn:hover {
            background-color: #da190b;
        }

        /* Footer */
        footer {
            background-color: #385440;
            color: white;
            padding: 1.5rem 0;
            margin-top: 2.5rem;
        }

        .footer-content {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            font-size: 0.875rem;
            gap: 1rem;
        }

        .footer-links a {
            color: white;
            text-decoration: none;
            margin-left: 1rem;
            transition: color 0.15s ease-in-out;
        }

        .footer-links a:hover {
            color: #6AA84F;
        }

        @media (min-width: 768px) {
            .footer-content { flex-direction: row; }
            .footer-links a { margin-left: 1.5rem; }
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <header>
        <nav>
            <div class="container navbar">
                <div class="logo">
                    <h2>PTME</h2>
                </div>
                <div class="nav-links">
                    <a href="index.html">Home</a>
                    <a href="terms and conditions.html">Profile</a>
                    <a href="">Contact</a>
                    <a href="favourites.html" id="fav-nav-link">❤️ Favourites</a>
                </div>
            </div>
        </nav>
    </header>

    <!-- Main -->
    <main>
        <div class="container">

            <div class="page-header">
                <h1>❤️ My Favourites</h1>
                <p>Your saved teas are shown below. They're stored on your device so they'll still be here after a refresh.</p>
            </div>

            <!-- JS builds the cards here -->
            <div id="fav-grid"></div>

            <button id="clear-all-btn" onclick="clearAll()">🗑 Clear All Favourites</button>

        </div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="container footer-content">
            <p>&copy; 2024 PTMEProject. All rights reserved.</p>
            <div class="footer-links">
                <a href="">Privacy Policy</a>
                <a href="terms.html">Terms of Service</a>
            </div>
        </div>
    </footer>

    <script>
        // All tea data — needed to look up description and type for each saved tea
        const allTeas = [
            { name: "Pure Tea Premium",  type: "Black Tea",  description: "A bold and rich blend perfect for a strong morning brew." },
            { name: "Pure Herbal Tea",   type: "Herbal",     description: "A soothing caffeine-free blend of natural herbs and botanicals." },
            { name: "Pure Label Tea",    type: "Green Tea",  description: "Light and refreshing with a delicate grassy flavour." },
            { name: "Kannan Devan",      type: "Black Tea",  description: "Classic highland tea with a smooth, earthy taste from the hills." },
            { name: "Oolong Select",     type: "Oolong Tea", description: "A semi-oxidised tea with a floral, fruity aroma." },
            { name: "Chakra Gold",       type: "Black Tea",  description: "A strong, full-bodied tea with a deep amber colour." },
            { name: "Mint Refresh",      type: "Herbal",     description: "Cool and invigorating peppermint herbal blend, great after meals." },
            { name: "Jade Mist",         type: "Green Tea",  description: "A premium green tea with a mild, sweet finish." }
        ];

        // Read favourites from localStorage
        function getFavourites() {
            const saved = localStorage.getItem("ptmeFavourites");
            return saved ? JSON.parse(saved) : [];
        }

        // Save favourites back to localStorage
        function saveFavourites(favs) {
            localStorage.setItem("ptmeFavourites", JSON.stringify(favs));
        }

        // Remove one tea and rebuild the page
        function removeFavourite(teaName) {
            let favs = getFavourites();
            favs = favs.filter(function(f) { return f !== teaName; });
            saveFavourites(favs);
            buildPage();
        }

        // Clear everything and rebuild
        function clearAll() {
            localStorage.removeItem("ptmeFavourites");
            buildPage();
        }

        // Build the favourites cards using DOM manipulation
        function buildPage() {
            const grid = document.getElementById("fav-grid");
            const clearBtn = document.getElementById("clear-all-btn");
            const favs = getFavourites();

            // Clear whatever is already on the page
            grid.innerHTML = "";

            if (favs.length === 0) {
                // Show the empty state
                clearBtn.style.display = "none";

                const empty = document.createElement("div");
                empty.className = "empty-state";

                const heading = document.createElement("h2");
                heading.textContent = "No favourites saved yet!";

                const msg = document.createElement("p");
                msg.textContent = "Head back to the tea menu and click '♡ Add to Favourites' on any tea.";

                const link = document.createElement("a");
                link.href = "index.html";
                link.textContent = "Browse the Tea Menu";

                empty.appendChild(heading);
                empty.appendChild(msg);
                empty.appendChild(link);
                grid.appendChild(empty);

            } else {
                clearBtn.style.display = "inline-block";

                // For each saved tea name, find its full data and build a card
                favs.forEach(function(teaName) {
                    const tea = allTeas.find(function(t) { return t.name === teaName; });
                    if (!tea) return; // skip if tea not found

                    const card = document.createElement("div");
                    card.className = "fav-card";

                    const heading = document.createElement("h3");
                    heading.textContent = tea.name;

                    const desc = document.createElement("p");
                    desc.textContent = tea.description;

                    const tag = document.createElement("span");
                    tag.className = "tea-tag";
                    tag.textContent = tea.type;

                    const removeBtn = document.createElement("button");
                    removeBtn.className = "remove-btn";
                    removeBtn.textContent = "✕ Remove";
                    removeBtn.onclick = function() { removeFavourite(tea.name); };

                    card.appendChild(heading);
                    card.appendChild(desc);
                    card.appendChild(tag);
                    card.appendChild(removeBtn);
                    grid.appendChild(card);
                });
            }
        }

        // Run on page load
        buildPage();
    </script>

</body>
</html>
